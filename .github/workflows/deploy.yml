name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy On Main Push
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy configuration
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          [ -n "$DEPLOY_HOST" ] || (echo "Missing variable: DEPLOY_HOST" && exit 1)
          [ -n "$DEPLOY_USER" ] || (echo "Missing variable: DEPLOY_USER" && exit 1)
          [ -n "$DEPLOY_PATH" ] || (echo "Missing variable: DEPLOY_PATH" && exit 1)
          [ -n "$DEPLOY_SSH_KEY" ] || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          port: ${{ vars.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd "${{ vars.DEPLOY_PATH }}"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            php artisan migrate --force
            php artisan storage:link || true

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache