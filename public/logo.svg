<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle shine overlay -->
  <rect x="32" y="32" width="448" height="224" rx="96" ry="96" fill="white" opacity="0.08"/>

  <!-- Compression arrows (squeeze inward) -->
  <!-- Left arrow pointing right -->
  <g transform="translate(256, 256)">
    <!-- Image/photo frame icon in center -->
    <rect x="-72" y="-72" width="144" height="144" rx="16" stroke="white" stroke-width="14" fill="none" opacity="0.95"/>

    <!-- Mountain scene inside frame -->
    <path d="M-58 40 L-20 -10 L10 25 L25 5 L58 40 Z" fill="white" opacity="0.85"/>

    <!-- Sun circle -->
    <circle cx="30" cy="-35" r="16" fill="white" opacity="0.85"/>

    <!-- Compress arrows - left -->
    <path d="M-140 0 L-95 0" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round"/>
    <path d="M-120 -20 L-95 0 L-120 20" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Compress arrows - right -->
    <path d="M140 0 L95 0" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round"/>
    <path d="M120 -20 L95 0 L120 20" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Compress arrows - top -->
    <path d="M0 -140 L0 -95" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round"/>
    <path d="M-20 -120 L0 -95 L20 -120" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Compress arrows - bottom -->
    <path d="M0 140 L0 95" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round"/>
    <path d="M-20 120 L0 95 L20 120" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Sparkle accents -->
  <circle cx="420" cy="100" r="6" fill="white" opacity="0.6"/>
  <circle cx="400" cy="130" r="3" fill="white" opacity="0.4"/>
  <circle cx="100" cy="400" r="5" fill="white" opacity="0.5"/>
  <circle cx="130" cy="420" r="3" fill="white" opacity="0.3"/>
</svg>
