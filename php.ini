; Custom PHP configuration for Image Compressor
; Increase upload limits to support up to 20MB images

; File upload limits
upload_max_filesize = 25M
post_max_size = 30M
max_file_uploads = 20

; Memory and execution limits
; Base limit — MemoryGuard middleware dynamically raises this per-request
; based on uploaded file size (up to MEMORY_GUARD_MAX_MB in .env).
; Keep this low so idle/non-upload requests stay lightweight on low-RAM servers.
memory_limit = 96M
max_execution_time = 120
max_input_time = 120

; Display errors (development only - disable in production)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Session settings
session.gc_maxlifetime = 7200
session.cookie_httponly = 1

; Other useful settings
date.timezone = UTC
